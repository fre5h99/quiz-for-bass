<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#171310">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>BASS FRET — 베이스 지판 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Hairline&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#171310;
  --bg2:#1f1913;
  --card:#241c14;
  --card-edge:#3a2d1e;
  --ink:#f3e9dc;
  --ink-dim:#a89a87;
  --amber:#ffb347;
  --amber-deep:#e8890c;
  --good:#6fe3a0;
  --bad:#ff6b6b;
  --wood1:#4a3320;
  --wood2:#2c1e12;
  --steel:#cfc4b4;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--ink);
  touch-action:manipulation;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(255,179,71,.10), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.008) 2px 4px);
  min-height:100dvh;
}
.bungee{font-family:'Bungee',cursive}

#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.screen{display:none;flex-direction:column;flex:1;padding:16px}
.screen.on{display:flex}

/* ---------- HOME ---------- */
.logo{margin:28px 4px 6px}
.logo h1{font-family:'Bungee';font-size:clamp(34px,10vw,44px);line-height:1.02;color:var(--amber);letter-spacing:.5px;text-shadow:0 0 28px rgba(255,179,71,.35)}
.logo h1 span{color:var(--ink)}
.logo p{color:var(--ink-dim);font-size:13.5px;margin-top:10px;letter-spacing:.3px}
.best-line{font-size:12px;color:var(--ink-dim);margin:14px 6px 4px;display:flex;gap:6px;align-items:center}
.best-line b{color:var(--amber);font-family:'Bungee';font-size:14px}

.modes{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.mode-card{
  display:flex;align-items:center;gap:14px;text-align:left;
  background:linear-gradient(160deg,var(--card),#1d160f);
  border:1px solid var(--card-edge);border-radius:var(--radius);
  padding:15px 16px;color:var(--ink);cursor:pointer;
  transition:transform .08s ease, border-color .15s;
  position:relative;overflow:hidden;
}
.mode-card:active{transform:scale(.975)}
.mode-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 88% 20%,rgba(255,179,71,.09),transparent 55%)}
.mode-glyph{
  width:46px;height:46px;flex:none;border-radius:12px;
  display:grid;place-items:center;font-family:'Bungee';font-size:19px;
  background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.25);
}
.mode-card h3{font-size:16px;font-weight:700;margin-bottom:3px}
.mode-card p{font-size:12px;color:var(--ink-dim);line-height:1.45}
.mode-card.study .mode-glyph{background:rgba(140,190,255,.10);color:#9cc4ee;border-color:rgba(140,190,255,.22)}

.settings{margin-top:18px;background:var(--bg2);border:1px solid var(--card-edge);border-radius:var(--radius);padding:14px 16px}
.settings h4{font-size:12px;color:var(--ink-dim);letter-spacing:1.5px;margin-bottom:12px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0}
.set-row label{font-size:14px}
.seg{display:flex;background:#171208;border-radius:10px;padding:3px;border:1px solid var(--card-edge)}
.seg button{border:0;background:transparent;color:var(--ink-dim);font-size:13px;padding:5px 13px;border-radius:8px;cursor:pointer;font-weight:600}
.seg button.sel{background:var(--amber);color:#231a08}
.toggle{width:46px;height:26px;border-radius:13px;background:#171208;border:1px solid var(--card-edge);position:relative;cursor:pointer;transition:background .2s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--ink-dim);transition:.2s}
.toggle.on{background:var(--amber-deep)}
.toggle.on::after{left:22px;background:#fff}
.foot{margin:20px 4px 8px;font-size:11px;color:#6b5f4f;text-align:center}

/* ---------- QUIZ ---------- */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.icon-btn{background:var(--bg2);border:1px solid var(--card-edge);color:var(--ink);width:38px;height:38px;border-radius:12px;font-size:17px;cursor:pointer;display:grid;place-items:center}
.progress{flex:1;height:6px;background:#2a2118;border-radius:3px;overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--amber-deep),var(--amber));border-radius:3px;transition:width .3s;width:0}
.scorebox{display:flex;gap:10px;font-family:'Bungee';font-size:13px}
.scorebox .sc{color:var(--good)}
.scorebox .st{color:var(--amber)}

.question{min-height:64px;display:flex;flex-direction:column;justify-content:center;text-align:center;margin:2px 0 8px}
.question .q-main{font-size:19px;font-weight:800;line-height:1.35}
.question .q-main .hl{color:var(--amber)}
.question .q-sub{font-size:12.5px;color:var(--ink-dim);margin-top:4px;min-height:17px}

/* ---------- FRETBOARD ---------- */
.board-wrap{flex:1;display:flex;justify-content:center;min-height:0;overflow-y:auto;overscroll-behavior:contain;border-radius:14px}
.board{
  width:min(78vw,300px);
  margin:auto;
  display:flex;flex-direction:column;flex:none;height:fit-content;
  border-radius:14px;
  background:linear-gradient(175deg,var(--wood1),var(--wood2) 70%);
  box-shadow:0 10px 40px rgba(0,0,0,.5), inset 0 0 60px rgba(0,0,0,.35);
  border:1px solid #503a22;
  position:relative;
}
.open-row{display:flex;height:44px;background:transparent;border-radius:14px 14px 0 0}
.f-row{display:flex;position:relative;border-bottom:2.5px solid #b8ad9c;box-shadow:0 3px 3px -1px rgba(0,0,0,.55)}
.f-row:last-child{border-radius:0 0 14px 14px;border-bottom:0;box-shadow:none}
.open-row{border-bottom:7px solid #efe6d6;box-shadow:0 3px 5px rgba(0,0,0,.6)} /* nut */
.cell{flex:1;position:relative;display:grid;place-items:center;cursor:pointer;min-height:52px}
.open-row .cell{min-height:44px}
.cell::before{ /* string */
  content:'';position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
  background:linear-gradient(90deg,#8d8578,#e8e0d2 45%,#8d8578);
  border-radius:2px;box-shadow:0 0 3px rgba(0,0,0,.7);
}
.open-row .cell::before{background:linear-gradient(90deg,#6f6a5e,#b6b0a2 45%,#6f6a5e)}
.cell.s0::before{width:6px}.cell.s1::before{width:5px}.cell.s2::before{width:4px}.cell.s3::before{width:3px}
.fret-num{position:absolute;left:-26px;top:50%;transform:translateY(-50%);font-family:'Bungee';font-size:11px;color:#7a6c58;width:20px;text-align:right}
.inlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f5ead8,#b9a988);opacity:.5;pointer-events:none}
.inlay.d1{transform:translate(-50%,-50%) translateX(-34px)}
.inlay.d2{transform:translate(-50%,-50%) translateX(34px)}
.str-label{font-family:'Bungee';font-size:12px;color:#a8987f;position:relative;z-index:2;background:#241a10;padding:3px 6px;border-radius:8px;border:1px solid #46351f}

.dot{
  position:relative;z-index:3;width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;font-family:'Bungee';font-size:12.5px;color:#231705;
  background:radial-gradient(circle at 32% 28%,#ffd58f,var(--amber) 60%,var(--amber-deep));
  box-shadow:0 0 14px rgba(255,179,71,.55), 0 2px 5px rgba(0,0,0,.5);
  animation:pop .25s ease;
}
.dot.q{font-size:16px}
.dot.root{background:radial-gradient(circle at 32% 28%,#ffe9c4,#f5f0e6 60%,#cfc4b4);box-shadow:0 0 10px rgba(255,255,255,.35),0 2px 5px rgba(0,0,0,.5);font-size:11px}
.dot.good{background:radial-gradient(circle at 32% 28%,#b9ffd9,var(--good) 60%,#2fae6c);box-shadow:0 0 16px rgba(111,227,160,.6)}
.dot.bad{background:radial-gradient(circle at 32% 28%,#ffc4c4,var(--bad) 60%,#c73e3e);box-shadow:0 0 16px rgba(255,107,107,.6)}
.dot.ghost{background:#3d352b;color:#e8e0d2;box-shadow:none;font-size:13px;border:1px solid rgba(255,255,255,.14)}
.dot.ghost.nat{background:radial-gradient(circle at 32% 28%,#ffd58f,var(--amber) 60%,var(--amber-deep));color:#231705;border:0;box-shadow:0 2px 5px rgba(0,0,0,.4)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.board.shake{animation:shake .3s ease}

/* ---------- ANSWERS ---------- */
.answers{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.ans{
  border:1px solid var(--card-edge);border-radius:14px;background:var(--card);
  color:var(--ink);padding:15px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform .07s;
}
.ans:active{transform:scale(.96)}
.ans .a-big{font-family:'Bungee';font-size:20px}
.ans .a-small{font-size:11px;color:var(--ink-dim)}
.ans.good{background:#1c3a2a;border-color:var(--good);color:var(--good)}
.ans.bad{background:#3a1c1c;border-color:var(--bad);color:var(--bad)}
.ans.dim{opacity:.35}
.tap-hint{margin-top:12px;text-align:center;font-size:13px;color:var(--ink-dim);padding:14px 0;min-height:48px}
.tap-hint b{color:var(--amber)}

/* ---------- RESULT ---------- */
.result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.result .r-emoji{font-size:52px}
.result h2{font-family:'Bungee';font-size:40px;color:var(--amber)}
.result .r-msg{color:var(--ink-dim);font-size:14px;margin-bottom:6px}
.r-stats{display:flex;gap:24px;margin:10px 0 22px}
.r-stats div{text-align:center}
.r-stats .n{font-family:'Bungee';font-size:26px;color:var(--ink)}
.r-stats .l{font-size:11px;color:var(--ink-dim);margin-top:3px}
.btn{border:0;border-radius:14px;padding:15px 30px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit}
.btn.primary{background:linear-gradient(120deg,var(--amber),var(--amber-deep));color:#231705;box-shadow:0 4px 20px rgba(255,179,71,.3)}
.btn.ghost-b{background:transparent;color:var(--ink-dim);margin-top:8px}

/* ---------- LESSON ---------- */
.l-dots{flex:1;display:flex;gap:6px;justify-content:center;align-items:center}
.l-dots i{width:8px;height:8px;border-radius:50%;background:#3a2f22;transition:.2s}
.l-dots i.on{background:var(--amber);box-shadow:0 0 8px rgba(255,179,71,.6)}
.l-card{background:var(--bg2);border:1px solid var(--card-edge);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.l-card h3{font-size:16.5px;color:var(--amber);margin-bottom:8px}
.l-card p{font-size:13.5px;line-height:1.68}
.l-card p+p{margin-top:7px}
.l-card .dim{color:var(--ink-dim);font-size:12.5px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:2px 0 8px}
.chip-row:empty{display:none}
.chip{border:1px solid var(--card-edge);background:var(--card);color:var(--ink);border-radius:20px;padding:9px 15px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
.chip:active{transform:scale(.94)}
.chip.sel{background:var(--amber);color:#231705;border-color:var(--amber)}
.chip.play{background:rgba(255,179,71,.10);border-color:rgba(255,179,71,.45);color:var(--amber)}
.chip.go{background:linear-gradient(120deg,var(--amber),var(--amber-deep));color:#231705;border:0}
.l-legend{display:flex;gap:12px;justify-content:center;font-size:11px;color:var(--ink-dim);margin:8px 0 0;flex-wrap:wrap}
.l-legend span{display:flex;align-items:center;gap:4px}
.l-legend b{width:10px;height:10px;border-radius:50%;display:inline-block}
.l-nav{display:flex;gap:10px;margin-top:10px}
.l-nav .btn{flex:1;padding:13px;font-size:14.5px}
.l-nav .btn:disabled{opacity:.3}
.dot.d3{background:radial-gradient(circle at 32% 28%,#ffc9be,#ff8a7a 60%,#d9503f);box-shadow:0 0 12px rgba(255,138,122,.45),0 2px 5px rgba(0,0,0,.5);font-size:11px}
.dot.d5{background:radial-gradient(circle at 32% 28%,#c2e4ff,#7ac9ff 60%,#3d8ecf);box-shadow:0 0 12px rgba(122,201,255,.45),0 2px 5px rgba(0,0,0,.5);font-size:11px}
.dot.d7{background:radial-gradient(circle at 32% 28%,#e4d2ff,#c9a2ff 60%,#8d5fd6);box-shadow:0 0 12px rgba(201,162,255,.45),0 2px 5px rgba(0,0,0,.5);font-size:11px}

/* ---------- STUDY ---------- */
.study-tools{display:flex;gap:8px;margin-bottom:12px;justify-content:center}
.study-note{margin-top:10px;text-align:center;font-size:12px;color:var(--ink-dim);line-height:1.6}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section class="screen on" id="scr-home">
    <div class="logo">
      <h1>BASS<br>FRET <span>QUIZ</span></h1>
      <p>지판 위치 보고 음 맞히기 · 이동시간 5분 트레이닝</p>
    </div>
    <div class="best-line" id="best-line"></div>
    <div class="modes">
      <button class="mode-card" data-mode="note">
        <span class="mode-glyph">C</span>
        <span><h3>음이름 퀴즈</h3><p>지판에 표시된 위치의 음이름(C, D, E…)을 고르세요</p></span>
      </button>
      <button class="mode-card" data-mode="solfege">
        <span class="mode-glyph">도</span>
        <span><h3>계이름 퀴즈</h3><p>같은 문제를 도레미파솔라시로 답합니다</p></span>
      </button>
      <button class="mode-card" data-mode="find">
        <span class="mode-glyph">?</span>
        <span><h3>위치 찾기</h3><p>제시된 음을 지판에서 직접 탭! 실전 감각 훈련</p></span>
      </button>
      <button class="mode-card study" data-mode="lesson">
        <span class="mode-glyph">♪</span>
        <span><h3>코드톤 배우기</h3><p>루트·3음·5음·7음이 뭔지 소리로 익히는 5분 레슨 (입문자용)</p></span>
      </button>
      <button class="mode-card" data-mode="chord">
        <span class="mode-glyph">R35</span>
        <span><h3>코드 톤 퀴즈</h3><p>루트 기준으로 3음·5음·7음 위치를 익힙니다 (베이스라인의 핵심)</p></span>
      </button>
      <button class="mode-card study" data-mode="study">
        <span class="mode-glyph">👁</span>
        <span><h3>지판 한눈에 보기</h3><p>0~12프렛 전체 음 배치도 · 퀴즈 전 눈에 익히기</p></span>
      </button>
    </div>
    <div class="settings">
      <h4>SETTINGS</h4>
      <div class="set-row">
        <label>프렛 범위</label>
        <div class="seg" id="seg-fret">
          <button data-v="5">0–5</button>
          <button data-v="12">0–12</button>
        </div>
      </div>
      <div class="set-row">
        <label>샵(#) 포함</label>
        <div class="toggle" id="tg-sharp"></div>
      </div>
      <div class="set-row">
        <label>정답 사운드 🔊</label>
        <div class="toggle" id="tg-sound"></div>
      </div>
    </div>
    <div class="foot">4현 베이스 표준 튜닝 · 왼쪽부터 4번줄(굵은 E) → 1번줄(G)</div>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="scr-quiz">
    <div class="topbar">
      <button class="icon-btn" id="btn-home">←</button>
      <div class="progress"><i id="prog"></i></div>
      <div class="scorebox"><span class="sc" id="sc">0</span><span class="st" id="st">🔥0</span></div>
    </div>
    <div class="question">
      <div class="q-main" id="q-main"></div>
      <div class="q-sub" id="q-sub"></div>
    </div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
    <div class="answers" id="answers"></div>
    <div class="tap-hint" id="tap-hint" style="display:none"></div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="scr-result">
    <div class="result">
      <div class="r-emoji" id="r-emoji"></div>
      <h2 id="r-score"></h2>
      <div class="r-msg" id="r-msg"></div>
      <div class="r-stats">
        <div><div class="n" id="r-acc"></div><div class="l">정답률</div></div>
        <div><div class="n" id="r-streak"></div><div class="l">최고 연속</div></div>
      </div>
      <button class="btn primary" id="btn-retry">한 번 더</button>
      <button class="btn ghost-b" id="btn-result-home">홈으로</button>
    </div>
  </section>

  <!-- LESSON -->
  <section class="screen" id="scr-lesson">
    <div class="topbar">
      <button class="icon-btn" id="btn-lesson-home">←</button>
      <div class="l-dots" id="l-dots"></div>
      <div style="width:38px"></div>
    </div>
    <div class="l-card">
      <h3 id="l-title"></h3>
      <div id="l-body"></div>
    </div>
    <div class="chip-row" id="l-chips"></div>
    <div class="board-wrap"><div class="board" id="lesson-board"></div></div>
    <div class="l-legend" id="l-legend"></div>
    <div class="chip-row" id="l-actions" style="margin-top:10px"></div>
    <div class="l-nav">
      <button class="btn ghost-b" id="l-prev">← 이전</button>
      <button class="btn primary" id="l-next">다음 →</button>
    </div>
  </section>

  <!-- STUDY -->
  <section class="screen" id="scr-study">
    <div class="topbar">
      <button class="icon-btn" id="btn-study-home">←</button>
      <div class="study-tools">
        <div class="seg" id="seg-label">
          <button data-v="note">CDE</button>
          <button data-v="solfege">도레미</button>
        </div>
      </div>
      <div style="width:38px"></div>
    </div>
    <div class="board-wrap"><div class="board" id="study-board"></div></div>
    <div class="study-note">주황 = 자연음(다장조 구성음) · 회색 = 샵/플랫<br>같은 현에서 12프렛 = 개방현과 같은 음(한 옥타브 위)</div>
  </section>

</div>

<script>
'use strict';
/* ===== 음악 데이터 ===== */
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SOL=['도','도#','레','레#','미','파','파#','솔','솔#','라','라#','시'];
const NATURALS=[0,2,4,5,7,9,11];
// 왼쪽부터 E(굵은현=4번줄) A D G(1번줄)
const STRINGS=[
  {name:'E',open:4,freq:41.20,num:4},
  {name:'A',open:9,freq:55.00,num:3},
  {name:'D',open:2,freq:73.42,num:2},
  {name:'G',open:7,freq:98.00,num:1},
];
const strL=s=>STRINGS[s].num+'번줄';
const strFull=s=>`${STRINGS[s].num}번줄(${STRINGS[s].name}현)`;
const noteAt=(s,f)=>(STRINGS[s].open+f)%12;
const CHORDS=[
  {name:'메이저',ivs:[0,4,7],deg:{0:'루트',4:'3음',7:'5음'}},
  {name:'마이너',ivs:[0,3,7],deg:{0:'루트',3:'♭3음',7:'5음'}},

  {name:'마이너7',ivs:[0,3,7,10],deg:{0:'루트',3:'♭3음',7:'5음',10:'♭7음'}},
];
const DEG_LABELS=['루트','3음','♭3음','5음','♭7음'];

/* ===== 설정/기록 ===== */
const store=(k,v)=>v===undefined?JSON.parse(localStorage.getItem('bfq_'+k)):localStorage.setItem('bfq_'+k,JSON.stringify(v));
let cfg=Object.assign({fretMax:5,sharps:false,sound:true},store('cfg')||{});
const saveCfg=()=>store('cfg',cfg);
let best=store('best')||{};

/* ===== 사운드 ===== */
let AC=null;
function playFreq(freq){
  if(!cfg.sound)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();
    o.type='triangle';o.frequency.value=freq;
    lp.type='lowpass';lp.frequency.value=900;
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.5,t+.015);
    g.gain.exponentialRampToValueAtTime(.0001,t+.9);
    o.connect(lp);lp.connect(g);g.connect(AC.destination);
    o.start(t);o.stop(t+1);
  }catch(e){}
}
const playPos=(s,f)=>playFreq(STRINGS[s].freq*Math.pow(2,f/12));

/* ===== 화면 전환 ===== */
const $=id=>document.getElementById(id);
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
}

/* ===== 지판 렌더링 ===== */
function buildBoard(el,fretMax,onTap,labels){
  el.innerHTML='';
  // 개방현 줄 (너트 위) — 퀴즈에서는 힌트 방지를 위해 줄 번호만 표시
  const open=document.createElement('div');open.className='open-row';
  for(let s=0;s<4;s++){
    const c=document.createElement('div');c.className='cell s'+s;c.dataset.s=s;c.dataset.f=0;
    const lb=document.createElement('span');lb.className='str-label';lb.textContent=labels==='name'?STRINGS[s].name:STRINGS[s].num;
    c.appendChild(lb);
    if(onTap)c.addEventListener('click',()=>onTap(s,0,c));
    open.appendChild(c);
  }
  el.appendChild(open);
  for(let f=1;f<=fretMax;f++){
    const row=document.createElement('div');row.className='f-row';row.dataset.f=f;
    const num=document.createElement('span');num.className='fret-num';num.textContent=f;row.appendChild(num);
    if([3,5,7,9].includes(f)){const i=document.createElement('span');i.className='inlay';row.appendChild(i);}
    if(f===12){
      const i1=document.createElement('span');i1.className='inlay d1';row.appendChild(i1);
      const i2=document.createElement('span');i2.className='inlay d2';row.appendChild(i2);
    }
    for(let s=0;s<4;s++){
      const c=document.createElement('div');c.className='cell s'+s;c.dataset.s=s;c.dataset.f=f;
      if(onTap)c.addEventListener('click',()=>onTap(s,f,c));
      row.appendChild(c);
    }
    el.appendChild(row);
  }
}
function cellAt(el,s,f){
  const rows=f===0?[el.querySelector('.open-row')]:[...el.querySelectorAll('.f-row')].filter(r=>+r.dataset.f===f);
  return rows[0]&&rows[0].querySelector(`.cell[data-s="${s}"]`);
}
function putDot(el,s,f,text,cls=''){
  const c=cellAt(el,s,f);if(!c)return null;
  if(f===0){const lb=c.querySelector('.str-label');if(lb)lb.style.visibility='hidden';}
  const d=document.createElement('span');d.className='dot '+cls;d.textContent=text;
  c.appendChild(d);return d;
}
function clearDots(el){
  el.querySelectorAll('.dot').forEach(d=>d.remove());
  el.querySelectorAll('.str-label').forEach(l=>l.style.visibility='');
}

/* ===== 유틸 ===== */
const rand=n=>Math.floor(Math.random()*n);
const pick=a=>a[rand(a.length)];
const shuffle=a=>a.sort(()=>Math.random()-.5);
function randPos(){
  // 설정 범위 내 무작위 위치 (샵 미포함이면 자연음 위치만)
  for(let i=0;i<200;i++){
    const s=rand(4),f=rand(cfg.fretMax+1);
    if(cfg.sharps||NATURALS.includes(noteAt(s,f)))return[s,f];
  }
  return[0,0];
}
const notePool=()=>cfg.sharps?[...Array(12).keys()]:NATURALS.slice();
const noteLabel=(n,mode)=>mode==='solfege'?SOL[n]:NOTES[n];
const noteBoth=n=>`${NOTES[n]} (${SOL[n]})`;

/* ===== 퀴즈 상태 ===== */
const TOTAL=10;
let Q={mode:null,idx:0,score:0,streak:0,bestStreak:0,cur:null,locked:false,timer:null};

function startQuiz(mode){
  Q={mode,idx:0,score:0,streak:0,bestStreak:0,cur:null,locked:false,timer:null};
  show('scr-quiz');
  nextQuestion();
}
function updateHud(){
  $('prog').style.width=(Q.idx/TOTAL*100)+'%';
  $('sc').textContent=Q.score;
  $('st').textContent='🔥'+Q.streak;
}
function nextQuestion(){
  if(Q.timer){clearTimeout(Q.timer);Q.timer=null;}
  if(Q.idx>=TOTAL)return finish();
  Q.locked=false;
  updateHud();
  const gen={note:genNote,solfege:genNote,find:genFind,chord:genChord}[Q.mode];
  gen();
  Q.idx++;
  updateHud();
}

/* --- 모드 1·2: 음이름/계이름 --- */
function genNote(){
  const [s,f]=randPos();
  const answer=noteAt(s,f);
  Q.cur={s,f,answer};
  buildBoard($('board'),cfg.fretMax,null);
  putDot($('board'),s,f,'?','q');
  scrollToFret(f);
  $('q-main').innerHTML=`이 위치의 <span class="hl">${Q.mode==='solfege'?'계이름':'음이름'}</span>은?`;
  $('q-sub').textContent=`${strL(s)} ${f===0?'개방현':f+'프렛'}`;
  // 보기 4개
  const pool=notePool().filter(n=>n!==answer);
  const opts=shuffle([answer,...shuffle(pool).slice(0,3)]);
  renderAnswers(opts.map(n=>({
    big:noteLabel(n,Q.mode),
    small:Q.mode==='solfege'?NOTES[n]:SOL[n],
    val:n
  })),n=>n===answer,(correct)=>{
    revealNote(correct);
  });
}
function revealNote(correct){
  const {s,f,answer}=Q.cur;
  const d=$('board').querySelector('.dot');
  d.textContent=NOTES[answer];
  d.classList.remove('q');
  d.classList.add(correct?'good':'bad');
  $('q-sub').textContent=`${strFull(s)} ${f===0?'개방현':f+'프렛'} = ${noteBoth(answer)}`;
  playPos(s,f);
}

/* --- 모드 3: 위치 찾기 --- */
function genFind(){
  const s=rand(4);
  const pool=notePool();
  // 해당 현의 범위 내에 존재하는 음만
  const inRange=pool.filter(n=>{
    for(let f=0;f<=cfg.fretMax;f++)if(noteAt(s,f)===n)return true;
    return false;
  });
  const target=pick(inRange);
  Q.cur={s,target};
  buildBoard($('board'),cfg.fretMax,onFindTap);
  $('q-main').innerHTML=`<span class="hl">${strL(s)}</span>에서 <span class="hl">${noteBoth(target)}</span> 찾기`;
  $('q-sub').textContent='지판을 직접 탭하세요';
  $('answers').innerHTML='';
  $('answers').style.display='none';
  $('tap-hint').style.display='block';
  $('tap-hint').innerHTML=`<b>${strL(s)}</b> 위의 아무 위치나 탭 (개방현 포함)`;
}
function onFindTap(s,f,cell){
  if(Q.locked)return;
  const {s:ts,target}=Q.cur;
  const correct=(s===ts&&noteAt(s,f)===target);
  Q.locked=true;
  putDot($('board'),s,f,NOTES[noteAt(s,f)],correct?'good':'bad');
  if(correct){
    playPos(s,f);
    $('tap-hint').innerHTML=`⭕ 정답! ${strFull(s)} ${f===0?'개방현':f+'프렛'} = ${noteBoth(target)}`;
  }else{
    // 정답 위치 표시
    for(let ff=0;ff<=cfg.fretMax;ff++){
      if(noteAt(ts,ff)===target)putDot($('board'),ts,ff,NOTES[target],'good');
    }
    $('board').classList.add('shake');
    $('tap-hint').innerHTML=`❌ 탭한 곳은 ${noteBoth(noteAt(s,f))} · 초록이 정답 위치`;
  }
  applyResult(correct);
  Q.timer=setTimeout(nextQuestion,correct?1200:2300);
}

/* --- 모드 4: 코드 톤 --- */
function genChord(){
  for(let tries=0;tries<300;tries++){
    const chord=pick(CHORDS);
    const rootNote=pick(NATURALS);
    // 루트 위치: E/A/D현, 타깃이 들어갈 여유 확보
    const rs=rand(3);
    const rf=rand(Math.max(1,cfg.fretMax-3))+1;
    if(noteAt(rs,rf)!==rootNote&&tries<250)continue;
    const realRoot=noteAt(rs,rf);
    // 타깃: 루트가 아닌 코드 톤, 루트 ±3프렛 이내
    const cands=[];
    for(let s=0;s<4;s++)for(let f=Math.max(0,rf-3);f<=Math.min(cfg.fretMax,rf+3);f++){
      if(s===rs&&f===rf)continue;
      const iv=(noteAt(s,f)-realRoot+12)%12;
      if(chord.ivs.includes(iv)&&iv!==0)cands.push([s,f,iv]);
    }
    if(!cands.length)continue;
    const [ts,tf,iv]=pick(cands);
    Q.cur={chord,root:realRoot,rs,rf,ts,tf,iv};
    buildBoard($('board'),cfg.fretMax,null);
    putDot($('board'),rs,rf,'R','root');
    putDot($('board'),ts,tf,'?','q');
    scrollToFret(Math.max(rf,tf));
    const chordName=NOTES[realRoot]+' '+chord.name;
    $('q-main').innerHTML=`<span class="hl">${chordName}</span> 코드 — <b>?</b>는 몇 음?`;
    $('q-sub').textContent=`구성음: ${chord.ivs.map(i=>NOTES[(realRoot+i)%12]).join(' · ')} (R=루트 ${NOTES[realRoot]})`;
    // 보기: 이 코드의 도수들 + 오답 도수
    const degs=new Set(chord.ivs.filter(i=>i!==0).map(i=>chord.deg[i]));
    DEG_LABELS.forEach(d=>{if(degs.size<4&&!degs.has(d)&&d!=='루트')degs.add(d)});
    const answer=chord.deg[iv];
    renderAnswers(shuffle([...degs]).slice(0,4).map(d=>({big:d,small:'',val:d})),
      d=>d===answer,
      correct=>{
        const d=$('board').querySelectorAll('.dot')[1];
        const dq=$('board').querySelector('.dot.q');
        dq.textContent=NOTES[noteAt(ts,tf)];
        dq.classList.remove('q');
        dq.classList.add(correct?'good':'bad');
        $('q-sub').textContent=`${NOTES[noteAt(ts,tf)]} = ${NOTES[realRoot]}의 ${answer} (${iv}반음 위)`;
        playPos(ts,tf);
      });
    // 보기 목록에 정답 없으면 재시도 방지
    return;
  }
}

/* --- 공통: 4지선다 렌더 --- */
function renderAnswers(opts,isCorrect,onReveal){
  $('tap-hint').style.display='none';
  const box=$('answers');
  box.style.display='grid';
  box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='ans';
    b.innerHTML=`<span class="a-big">${o.big}</span>${o.small?`<span class="a-small">${o.small}</span>`:''}`;
    b.addEventListener('click',()=>{
      if(Q.locked)return;Q.locked=true;
      const correct=isCorrect(o.val);
      b.classList.add(correct?'good':'bad');
      if(!correct){
        $('board').classList.add('shake');
        [...box.children].forEach((bb,i)=>{
          if(isCorrect(opts[i].val))bb.classList.add('good');
          else if(bb!==b)bb.classList.add('dim');
        });
      }else{
        [...box.children].forEach(bb=>{if(bb!==b)bb.classList.add('dim')});
      }
      onReveal(correct);
      applyResult(correct);
      Q.timer=setTimeout(nextQuestion,correct?1100:2200);
    });
    box.appendChild(b);
  });
}
function applyResult(correct){
  if(correct){Q.score++;Q.streak++;Q.bestStreak=Math.max(Q.bestStreak,Q.streak);}
  else Q.streak=0;
  setTimeout(()=>$('board').classList.remove('shake'),350);
  updateHud();
}
function scrollToFret(f){
  const wrap=document.querySelector('#scr-quiz .board-wrap');
  const row=cellAt($('board'),0,f)?.parentElement;
  if(row&&wrap)requestAnimationFrame(()=>row.scrollIntoView({block:'center',behavior:'instant'}));
}

/* --- 결과 --- */
function finish(){
  const acc=Math.round(Q.score/TOTAL*100);
  const b=best[Q.mode]||0;
  if(Q.score>b){best[Q.mode]=Q.score;store('best',best);}
  $('r-emoji').textContent=acc===100?'🏆':acc>=80?'🎸':acc>=50?'💪':'🌱';
  $('r-score').textContent=`${Q.score}/${TOTAL}`;
  $('r-msg').textContent=acc===100?'퍼펙트! 지판이 눈에 보이기 시작했어요'
    :acc>=80?'훌륭해요! 곧 지판을 안 보고도 치겠는데요'
    :acc>=50?'좋아요, 틀린 위치 위주로 한 번 더!'
    :'괜찮아요. "지판 한눈에 보기"로 먼저 눈에 익혀보세요';
  $('r-acc').textContent=acc+'%';
  $('r-streak').textContent=Q.bestStreak;
  show('scr-result');
  renderBest();
}

    {label:'▶ 루트–5음 패턴',run(){playSeq([C_R,C_5,C_R,C_5])}},
    {label:'▶ 아래 5음 버전',run(){playSeq([C_R,C_5low,C_R,C_5low])}},
  ],
},
{
  title:'7음 — 세련된 한 스푼',
  body:`<p><b>7음</b>을 더하면 코드가 네 음이 돼요. 두 종류가 있어요.</p>
  <p><b>♭7 (10반음 위)</b> → 블루스·펑크·록의 <b>도미넌트7</b> (C7, G7…)<br><b>장7 (11반음 위)</b> → 부드럽고 재지한 <b>메이저7</b> (Cmaj7…)</p>
  <p class="dim">부기우기 베이스라인의 그 특유의 맛이 바로 ♭7이에요. 7음은 첫 박보다는 라인 중간·끝에서 빛을 발해요.</p>`,
  legend:['R','t3','t5','t7'],
  setup(){lBoard();lDot(C_R,0);lDot(C_3,4);lDot(C_5,7);lDot(C_b7,10);lDot(C_7,11);},
  actions:[
    {label:'▶ C7 (R·3·5·♭7)',run(){playSeq([C_R,C_3,C_5,C_b7])}},
    {label:'▶ Cmaj7 (R·3·5·7)',run(){playSeq([C_R,C_3,C_5,C_7])}},
  ],
},
{
  title:'외울 건 딱 하나 — 모양',
  body:`<p>좋은 소식: 루트가 어디 있든 <b>코드톤의 상대 위치(모양)는 똑같아요.</b></p>
  <p>이 <b>R–3–5–R(옥타브)</b> 모양 하나면 모든 메이저 코드를 어느 키에서든 칠 수 있어요. 마이너는 3음만 한 프렛 뒤로 당기면 끝.</p>
  <p class="dim">아래 칩으로 루트를 옮겨보세요 — 모양은 그대로 따라옵니다!</p>`,
  legend:['R','t3','t5'],
  chips:[
    {label:'F',pos:[0,1]},{label:'G',pos:[0,3]},{label:'A',pos:[0,5]},{label:'C',pos:[1,3]},{label:'D',pos:[1,5]},
  ],
  onChip(ch){
    clearDots($('lesson-board'));
    const sh=shapeOf(ch.pos[0],ch.pos[1]);
    lDot(sh.R,0);lDot(sh.t3,4);lDot(sh.t5,7);lDot(sh.R8,0);
    playSeq([sh.R,sh.t3,sh.t5,sh.R8],360);
  },
  setup(){
    lBoard();
    const sh=shapeOf(1,3);
    lDot(sh.R,0);lDot(sh.t3,4);lDot(sh.t5,7);lDot(sh.R8,0);
  },
  actions:[{label:'▶ 아르페지오 (위로↑ 아래로↓)',run(){
    const c=LESSON[5].chips[L.chip]||{pos:[1,3]};
    const sh=shapeOf(c.pos[0],c.pos[1]);
    playSeq([sh.R,sh.t3,sh.t5,sh.R8,sh.t5,sh.t3,sh.R],360);
  }}],
},
{
  title:'코드 익스플로러 🎛',
  body:`<p>실제 곡에 자주 나오는 코드를 골라 <b>지판 위 모든 코드톤</b>을 눈으로 확인하고 들어보세요.</p>
  <p class="dim">눈에 익었다면 이제 <b>코드 톤 퀴즈</b>로 실력을 확인할 차례!</p>`,
  legend:['R','t3','t5','t7'],
  chips:EXP_CHORDS.map(c=>({label:c.label,chord:c})),
  onChip(ch){renderExplorer(ch.chord);},
  setup(){renderExplorer(EXP_CHORDS[0]);},
  actions:[
    {label:'▶ 아르페지오',run(){playExplorer(EXP_CHORDS.find(c=>c.label===LESSON[6].chips[L.chip].label)||EXP_CHORDS[0]);}},
    {label:'🎯 코드 톤 퀴즈 풀기',go:true,run(){startQuiz('chord');}},
  ],
},
];
function renderExplorer(chord){
  lBoard();
  for(let s=0;s<4;s++)for(let f=0;f<=7;f++){
    const iv=(noteAt(s,f)-chord.root+12)%12;
    if(chord.ivs.includes(iv))lDot([s,f],iv);
  }
}
function playExplorer(chord){
  lStopAll();
  // 가장 낮은 루트 위치에서 위로 아르페지오
  let base=null,bf=1e9;
  for(let s=0;s<4;s++)for(let f=0;f<=7;f++){
    if(noteAt(s,f)===chord.root){
      const fr=STRINGS[s].freq*Math.pow(2,f/12);
      if(fr<bf){bf=fr;base=fr;}
    }
  }
  const seq=[...chord.ivs,12];
  seq.forEach((iv,i)=>L.timers.push(setTimeout(()=>playFreq(base*Math.pow(2,iv/12)),i*400)));
}
function renderLesson(){
  lStopAll();
  const st=LESSON[L.step];
  L.chip=0;
  $('l-dots').innerHTML=LESSON.map((_,i)=>`<i class="${i===L.step?'on':''}"></i>`).join('');
  $('l-title').textContent=st.title;
  $('l-body').innerHTML=st.body;
  $('l-legend').innerHTML=(st.legend||[]).map(k=>LEGEND_HTML[k]).join('');
  const chips=$('l-chips');chips.innerHTML='';
  (st.chips||[]).forEach((ch,i)=>{
    const b=document.createElement('button');b.className='chip'+(i===0?' sel':'');b.textContent=ch.label;
    b.addEventListener('click',()=>{
      L.chip=i;
      [...chips.children].forEach(x=>x.classList.toggle('sel',x===b));
      st.onChip(ch);
    });
    chips.appendChild(b);
  });
  const acts=$('l-actions');acts.innerHTML='';
  (st.actions||[]).forEach(a=>{
    const b=document.createElement('button');b.className='chip '+(a.go?'go':'play');b.textContent=a.label;
    b.addEventListener('click',a.run);
    acts.appendChild(b);
  });
  st.setup();
  $('l-prev').disabled=L.step===0;
  $('l-next').textContent=L.step===LESSON.length-1?'🎯 퀴즈 풀러 가기':'다음 →';
}
$('l-prev').addEventListener('click',()=>{if(L.step>0){L.step--;renderLesson();}});
$('l-next').addEventListener('click',()=>{
  if(L.step===LESSON.length-1)startQuiz('chord');
  else{L.step++;renderLesson();}
});
$('btn-lesson-home').addEventListener('click',()=>{lStopAll();show('scr-home');});

/* ===== 학습 모드 ===== */
let studyLabel='note';
function renderStudy(){
  const el=$('study-board');
  buildBoard(el,12,(s,f)=>playPos(s,f),'name');
  for(let s=0;s<4;s++)for(let f=0;f<=12;f++){
    const n=noteAt(s,f);
    const nat=NATURALS.includes(n);
    if(!nat&&!cfg.sharps)continue;
    putDot(el,s,f,studyLabel==='solfege'?SOL[n]:NOTES[n],'ghost'+(nat?' nat':''));
  }
}

/* ===== 홈 ===== */
function renderBest(){
  const names={note:'음이름',solfege:'계이름',find:'위치찾기',chord:'코드톤'};
  const parts=Object.keys(names).filter(k=>best[k]!==undefined).map(k=>`${names[k]} <b>${best[k]}</b>`);
  $('best-line').innerHTML=parts.length?'🏅 최고기록 — '+parts.join(' · '):'';
}
function renderSettings(){
  document.querySelectorAll('#seg-fret button').forEach(b=>b.classList.toggle('sel',+b.dataset.v===cfg.fretMax));
  $('tg-sharp').classList.toggle('on',cfg.sharps);
  $('tg-sound').classList.toggle('on',cfg.sound);
}

/* ===== 이벤트 ===== */
document.querySelectorAll('.mode-card').forEach(c=>c.addEventListener('click',()=>{
  const m=c.dataset.mode;
  if(m==='study'){renderStudy();show('scr-study');}
  else if(m==='lesson'){L.step=0;renderLesson();show('scr-lesson');}
  else startQuiz(m);
}));
document.querySelectorAll('#seg-fret button').forEach(b=>b.addEventListener('click',()=>{
  cfg.fretMax=+b.dataset.v;saveCfg();renderSettings();
}));
$('tg-sharp').addEventListener('click',()=>{cfg.sharps=!cfg.sharps;saveCfg();renderSettings();});
$('tg-sound').addEventListener('click',()=>{cfg.sound=!cfg.sound;saveCfg();renderSettings();});
document.querySelectorAll('#seg-label button').forEach(b=>b.addEventListener('click',()=>{
  studyLabel=b.dataset.v;
  document.querySelectorAll('#seg-label button').forEach(x=>x.classList.toggle('sel',x===b));
  renderStudy();
}));
document.querySelector('#seg-label button[data-v="note"]').classList.add('sel');
$('btn-home').addEventListener('click',()=>{if(Q.timer)clearTimeout(Q.timer);show('scr-home');});
$('btn-study-home').addEventListener('click',()=>show('scr-home'));
$('btn-result-home').addEventListener('click',()=>show('scr-home'));
$('btn-retry').addEventListener('click',()=>startQuiz(Q.mode));

renderSettings();renderBest();

/* ===== PWA ===== */
if('serviceWorker' in navigator&&location.protocol==='https:')
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
